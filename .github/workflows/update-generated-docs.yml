name: "Update Generated Docs"

on:
  push:
    branches: [GB-1405/automate-cli-docs-update]

permissions: {}

jobs:
  test_create_pr:
    runs-on: ubuntu-latest
    environment: Docs generation
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - run: |
         sudo apt-get update
         sudo apt-get install -y libdbus-1-dev pkg-config

      - run: git clone --depth=1 https://github.com/gitbutlerapp/gitbutler ../gitbutler
      - run: ./scripts/update-manpages.sh

      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          branch="test-generated-docs-${{ github.run_id }}"
          git checkout -b "$branch"
          git add .
          git commit -m "Update CLI docs"
          git push origin "$branch"

          echo "branch=$branch" >> "$GITHUB_ENV"

      - run: |
          gh pr create \
            --title "Update generated CLI documentation" \
            --body "Created by CI" \
            --base main \
            --head "$branch"
        env:
          GH_TOKEN: ${{ secrets.GH_CREATE_PR_PAT }}
